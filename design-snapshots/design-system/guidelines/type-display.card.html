<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; padding: 22px; background: var(--surface-container-lowest); }
  h1,h2,h3 { font-family: var(--font-heading); font-weight: 700; letter-spacing: -0.025em; line-height: 1.12; color: var(--foreground); margin: 0 0 4px; }
  .meta { font: 500 11px/1 var(--font-sans); color: var(--muted-foreground); font-family: ui-monospace, monospace; margin-bottom: 16px; }
</style>
</head>
<body>
  <h1 style="font-size:44px">Você não está gerenciando.</h1>
  <div class="meta">display-lg · 44px / 700</div>
  <h2 style="font-size:36px">Recebe a operação inteira.</h2>
  <div class="meta">display-md · 36px / 700</div>
  <h3 style="font-size:24px">Cobrança que acontece sem você</h3>
  <div class="meta">heading · 24px / 700</div>
</body>
</html>
