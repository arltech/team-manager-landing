<!-- @dsCard group="Spacing" viewport="700x180" name="Radius scale" subtitle="sm 7px → 2xl 21.6px (signature card) → full pill" -->
<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; padding: 22px; background: var(--surface-container-lowest); font-family: var(--font-sans); }
  .row { display: flex; gap: 18px; align-items: flex-end; flex-wrap: wrap; }
  .box { width: 74px; height: 74px; background: color-mix(in srgb, var(--primary) 12%, transparent); border: 1.5px solid var(--primary); }
  .nm { font-size: 11px; font-weight: 700; color: var(--foreground); margin-top: 8px; }
  .px { font-size: 10px; color: var(--muted-foreground); font-family: ui-monospace, monospace; }
  .cell { text-align: center; }
</style>
</head>
<body>
<div class="row">
  <div class="cell"><div class="box" style="border-radius:var(--radius-sm)"></div><div class="nm">sm</div><div class="px">7.2px</div></div>
  <div class="cell"><div class="box" style="border-radius:var(--radius-md)"></div><div class="nm">md</div><div class="px">9.6px</div></div>
  <div class="cell"><div class="box" style="border-radius:var(--radius-lg)"></div><div class="nm">lg</div><div class="px">12px</div></div>
  <div class="cell"><div class="box" style="border-radius:var(--radius-xl)"></div><div class="nm">xl</div><div class="px">16.8px</div></div>
  <div class="cell"><div class="box" style="border-radius:var(--radius-2xl)"></div><div class="nm">2xl · card</div><div class="px">21.6px</div></div>
  <div class="cell"><div class="box" style="border-radius:var(--radius-full)"></div><div class="nm">full · pill</div><div class="px">999px</div></div>
</div>
</body>
</html>
