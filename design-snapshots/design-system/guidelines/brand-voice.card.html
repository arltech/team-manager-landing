<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; padding: 24px; background: var(--surface-container-lowest); font-family: var(--font-sans); color: var(--foreground); }
  .quote { font-family: var(--font-heading); font-weight: 700; font-size: 22px; line-height: 1.25; letter-spacing: -0.02em; max-width: 620px; }
  .em { color: var(--destructive); }
  .mut { color: var(--muted-foreground); }
  .tags { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 18px; }
  .tag { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: .06em; padding: 5px 11px; border-radius: 999px; background: var(--surface-container); color: var(--on-surface-variant); }
</style>
</head>
<body>
  <div class="quote">Se você precisa <em>perguntar</em> pra saber o que aconteceu, você não está gerenciando. <span class="em">Está investigando.</span></div>
  <div class="tags">
    <span class="tag">2ª pessoa (você)</span>
    <span class="tag">Confronta &amp; resolve</span>
    <span class="tag">Frases curtas</span>
    <span class="tag">Números concretos</span>
    <span class="tag">Sem emoji</span>
    <span class="tag">PT-BR informal</span>
  </div>
</body>
</html>
