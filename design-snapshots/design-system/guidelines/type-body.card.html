<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; padding: 22px; background: var(--surface-container-lowest); font-family: var(--font-sans); color: var(--foreground); }
  .meta { font: 500 11px/1 ui-monospace, monospace; color: var(--muted-foreground); margin: 4px 0 16px; }
  .eyebrow { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.08em; color: var(--primary); }
  .micro { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.14em; color: var(--on-surface-variant); }
</style>
</head>
<body>
  <p style="font-size:18px; line-height:1.6; color:var(--muted-foreground); margin:0; max-width:560px;">
    Team Manager é o sistema de operação para redes de escolas e cursos que faz o trabalho de cobrar, lembrar e reportar.
  </p>
  <div class="meta">body-lg · 18px / 1.6 · muted-foreground</div>
  <span class="eyebrow">A Solução</span>
  <div class="meta">eyebrow · 11px / 700 · 0.08em · uppercase</div>
  <span class="micro">O que elimina</span>
  <div class="meta">micro label · 10px / 700 · 0.14em · uppercase</div>
</body>
</html>
