<!-- @dsCard group="Spacing" viewport="700x170" name="Elevation & shadows" subtitle="Card rest/hover, primary glow, button shadow" -->
<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; padding: 26px; background: var(--surface-container); font-family: var(--font-sans); }
  .row { display: flex; gap: 26px; flex-wrap: wrap; }
  .box { width: 130px; height: 70px; background: var(--card); border: 1px solid var(--border); border-radius: var(--radius-2xl); display:flex; align-items:center; justify-content:center; font-size:11px; font-weight:700; color:var(--on-surface-variant); }
  .nm { font-size: 11px; font-weight: 700; color: var(--foreground); margin-top: 10px; }
  .cell { text-align: center; }
</style>
</head>
<body>
<div class="row">
  <div class="cell"><div class="box" style="box-shadow:var(--shadow-card)">card</div><div class="nm">card (rest)</div></div>
  <div class="cell"><div class="box" style="box-shadow:var(--shadow-card-hover)">hover</div><div class="nm">card-hover</div></div>
  <div class="cell"><div class="box" style="box-shadow:var(--shadow-glow-primary); border-color:var(--primary)">glow</div><div class="nm">glow-primary</div></div>
  <div class="cell"><div class="box" style="box-shadow:var(--shadow-btn); background:linear-gradient(135deg,var(--primary),var(--primary-container)); color:#fff; border:0">btn</div><div class="nm">btn shadow</div></div>
</div>
</body>
</html>
