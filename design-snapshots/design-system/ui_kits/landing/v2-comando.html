                <div>
                  <div style={{ fontWeight:700, fontSize:14 }}>Diretor de rede</div>
                  <div style={{ fontSize:13, color:"var(--muted-foreground)" }}>3 unidades · Escola de idiomas · Piloto Team Manager</div>
                </div>
              </div>
            </div>
          </Reveal>
        </div>
      </section>

      {WhatsProof && <WhatsProof/>}

      {/* ── OFFER ── */}
      <section id="oferta" style={{ background:"#f4f2fc", color:"#1a1b22", padding:"112px 0" }}>
        <div style={{ maxWidth:1140, margin:"0 auto", padding:"0 28px" }}>
          <Reveal style={{ textAlign:"center", marginBottom:18 }}>{eyebrow("A oferta")}</Reveal>
          <Reveal delay={.05}><h2 style={{ fontFamily:"var(--font-heading)", fontWeight:800, letterSpacing:"-.025em", fontSize:"clamp(30px,4vw,46px)", textAlign:"center", margin:"0 0 12px" }}>Você paga por um sistema. Recebe a operação inteira.</h2></Reveal>
          <Reveal delay={.1}><p style={{ textAlign:"center", color:"var(--muted-foreground)", fontSize:17, maxWidth:600, margin:"0 auto 76px", lineHeight:1.6 }}>Equivalente de mercado: R$ 12.390/mês. <strong style={{ color:"#1a1b22" }}>Seu investimento sai no diagnóstico gratuito.</strong></p></Reveal>
          <div className="plans" style={{ display:"grid", gridTemplateColumns:"repeat(3,1fr)", gap:24, alignItems:"start" }}>
            {PLANS.map((p,i) => (
              <Reveal key={p.name} delay={i*.07}>
                <div style={{ position:"relative", background:"#fff", border: p.feat ? "2px solid var(--primary)" : "1px solid var(--border)", borderRadius:24, padding:36, boxShadow: p.feat ? "var(--shadow-glow-primary)" : "var(--shadow-card)", transform: p.feat ? "scale(1.03)" : "none" }}>
                  {p.feat && <div style={{ position:"absolute", top:-13, left:"50%", transform:"translateX(-50%)" }}><Pill tone="solid-primary"><Icon size={13} fill="currentColor" sw={0}>{ic.spark}</Icon> Recomendado</Pill></div>}
                  <h3 style={{ fontFamily:"var(--font-heading)", fontWeight:800, fontSize:28, margin:"0 0 6px" }}>{p.name}</h3>
                  <div style={{ fontSize:13.5, color:"var(--muted-foreground)" }}>{p.units}</div>
                  <div style={{ fontSize:13.5, color:"var(--muted-foreground)", marginBottom:26 }}>{p.users}</div>
                  <div style={{ fontFamily:"var(--font-heading)", fontWeight:800, fontSize:26 }}>Sob diagnóstico</div>
                  <p style={{ fontSize:12, color:"var(--muted-foreground)", margin:"6px 0 24px", lineHeight:1.5 }}>Definido pelo porte da sua rede, no diagnóstico gratuito.</p>
                  <p style={{ fontSize:14, color:"color-mix(in srgb,#1a1b22 82%,transparent)", lineHeight:1.6, marginBottom:26, minHeight:62 }}>{p.hi}</p>
                  <Button variant={p.feat ? "primary" : "outline"} fullWidth onClick={toast}>Agendar demonstração</Button>
                </div>
              </Reveal>
            ))}
          </div>
          <Reveal delay={.1} style={{ maxWidth:760, margin:"40px auto 0" }}>
            <div style={{ display:"flex", gap:20, alignItems:"flex-start", padding:36, borderRadius:22, border:"1px solid color-mix(in srgb,var(--success) 40%,transparent)", background:"var(--success-subtle)" }}>
              <span style={{ display:"inline-flex", alignItems:"center", justifyContent:"center", width:54, height:54, borderRadius:18, background:"color-mix(in srgb,var(--success) 15%,transparent)", color:"var(--success)", flexShrink:0 }}><Icon size={24}>{ic.shield}</Icon></span>
              <div>
                <h3 style={{ fontFamily:"var(--font-heading)", fontWeight:700, fontSize:20, margin:"0 0 10px" }}>Garantia de 30 dias</h3>
                <p style={{ color:"color-mix(in srgb,#1a1b22 85%,transparent)", lineHeight:1.6, margin:0 }}>Se em 30 dias você não conseguir ver o funil de todas as unidades sem perguntar a ninguém, devolvemos 100%, sem perguntas.</p>
              </div>
            </div>
          </Reveal>
        </div>
      </section>

      {/* ── FAQ ── */}
      <section id="faq" style={{ background:"#fbf8ff", color:"#1a1b22", padding:"112px 0" }}>
        <div style={{ maxWidth:760, margin:"0 auto", padding:"0 28px" }}>
          <Reveal><div style={{ marginBottom:18 }}>{eyebrow("Perguntas frequentes", "#757684")}</div></Reveal>
          <Reveal delay={.05}><h2 style={{ fontFamily:"var(--font-heading)", fontWeight:800, letterSpacing:"-.025em", fontSize:"clamp(28px,3.5vw,42px)", margin:"0 0 40px" }}>As 5 que mais aparecem.</h2></Reveal>
          <div style={{ display:"flex", flexDirection:"column", gap:14 }}>
            {FAQS.map(([q,a],i) => (
              <Reveal key={i} delay={i*.04}>
                <Accordion variant="card" summary={<span style={{ fontWeight:700, fontSize:17 }}>{q}</span>}>
                  <p style={{ color:"var(--muted-foreground)", lineHeight:1.6, margin:0, fontSize:15 }}>{a}</p>
                </Accordion>
              </Reveal>
            ))}
          </div>
        </div>
      </section>

      {/* ── CTA FINAL ── */}
      <section style={{ position:"relative", overflow:"hidden", background:"linear-gradient(135deg,var(--hero-from),var(--hero-to))", color:"#f5f5fa", padding:"120px 0" }}>
        <div className="aurora"><span style={{ top:"10%", left:"40%", width:520, height:520, background:"rgba(99,102,241,.35)" }} /></div>
        <div style={{ position:"relative", maxWidth:760, margin:"0 auto", padding:"0 28px", textAlign:"center" }}>
          <Reveal><h2 style={{ fontFamily:"var(--font-heading)", fontWeight:800, letterSpacing:"-.025em", fontSize:"clamp(32px,4.5vw,52px)", lineHeight:1.1, margin:"0 0 28px" }}>Não é uma escolha de software.<br/><span style={{ color:"rgba(255,255,255,.5)" }}>É sobre o tipo de gestor que você quer ser.</span></h2></Reveal>
          <Reveal delay={.08}><p style={{ fontSize:18, color:"rgba(255,255,255,.78)", maxWidth:560, margin:"0 auto 36px", lineHeight:1.6 }}>Seja o gestor que não precisa cobrar porque o sistema cobra. Que não precisa investigar porque já sabe.</p></Reveal>
          <Reveal delay={.14}>
            <Button variant="primary" size="lg" iconRight={<A/>} onClick={toast}>Ativar o Team Manager · garantia de 30 dias</Button>
            <p style={{ marginTop:24, fontSize:13.5, color:"rgba(255,255,255,.55)", display:"flex", alignItems:"center", justifyContent:"center", gap:8 }}><Icon size={14}>{ic.shield}</Icon> Devolução integral em 30 dias. Sem perguntas.</p>
          </Reveal>
        </div>
      </section>

      {/* ── FOOTER ── */}
      <footer style={{ background:"#070a1c", color:"rgba(255,255,255,.5)", padding:"44px 0" }}>
        <div style={{ maxWidth:1200, margin:"0 auto", padding:"0 28px", display:"flex", justifyContent:"space-between", alignItems:"center", flexWrap:"wrap", gap:16 }}>
          <img src="../../assets/logo-mark.png" alt="Team Manager" style={{ height:36, opacity:.85 }} />
          <span style={{ fontSize:13 }}>© Team Manager · ARLTech · Sistema de operação para redes de escolas e cursos</span>
        </div>
      </footer>
    </div>
  );
}
function boot(){ if(window.TMv2 && window.TeamManagerDesignSystem_6cb67c){ ReactDOM.createRoot(document.getElementById("root")).render(<App/>); } else setTimeout(boot,40); }
boot();
</script>
</body>
</html>
